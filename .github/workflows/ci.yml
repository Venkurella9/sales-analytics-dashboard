name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          pip install -r requirements.txt
      - name: Generate data and build DB
        run: |
          . .venv/bin/activate
          python data/generate_data.py --rows 100000
          python data/clean_data.py
      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest -q
